<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>調査マップ</title>

  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background-color: #f5f5f5;
    }

    header {
      padding: 16px;
      background-color: #ffffff;
      border-bottom: 1px solid #ddd;
    }

    h1 {
      margin: 0;
      font-size: 22px;
    }

    p {
      margin: 8px 0 0;
      font-size: 14px;
      line-height: 1.6;
    }

    .legend {
      padding: 12px 16px;
      background-color: #ffffff;
      font-size: 14px;
    }

    .map-box {
      width: 100%;
      height: 70vh;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: 0;
    }

    @media screen and (min-width: 768px) {
      .map-box {
        height: 600px;
      }

      h1 {
        font-size: 28px;
      }
    }
  </style>
</head>

<body>

  <header>
    <h1>大阪工業大学周辺調査マップ</h1>
    <p>一時停止と自転車通行可能歩道をまとめたマップです。</p>
  </header>

  <div class="legend">
    🔴 一時停止　/　🔵 自転車通行可能歩道
  </div>

  <div class="map-box">
    <iframe
      src="https://umap.openstreetmap.fr/ja/map/map_1404748"
      allowfullscreen>
    </iframe>
  </div>

</body>
</html>
